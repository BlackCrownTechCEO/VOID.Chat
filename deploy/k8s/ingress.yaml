apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: void-api
  namespace: void
spec:
  rules:
    - host: api.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: void-api
                port:
                  number: 80
